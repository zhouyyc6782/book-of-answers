<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>解答之書 The Grimoire of Answers</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serifTC: ['"Noto Serif TC"', 'serif'],
            sansTC: ['"Noto Sans TC"', 'sans-serif']
          },
          boxShadow: {
            arcane: '0 35px 80px rgba(0, 0, 0, 0.65), 0 0 40px rgba(206, 165, 86, 0.16)'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-deep: #09040f;
      --bg-mid: #190926;
      --bg-violet: #2a0f3a;
      --gold: #d3ae62;
      --gold-soft: rgba(211, 174, 98, 0.42);
      --ink-dark: #110b0d;
      --cover-1: #2d1b16;
      --cover-2: #150f0d;
      --parchment: #f4ecd8;
      --parchment-edge: #dfd2b5;
      --book-w: clamp(160px, 34vw, 320px);
      --book-h: clamp(220px, 42vh, 460px);
    }

    @media (min-width: 768px) {
      :root {
        --book-w: clamp(220px, 30vw, 320px);
        --book-h: clamp(320px, 46vh, 460px);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 18%, var(--bg-violet) 0%, var(--bg-mid) 40%, var(--bg-deep) 72%),
        linear-gradient(180deg, #0b0614, #030205 80%);
      color: #f4f0e4;
      overflow-x: hidden;
      font-family: "Noto Sans TC", sans-serif;
      position: relative;
    }

    /* 背景魔法阵与星尘：仅用伪元素和动画，避免额外图片资源 */
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -25%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle, rgba(224, 185, 96, 0.2) 0 2px, transparent 2px),
        radial-gradient(circle at 60% 42%, rgba(241, 214, 155, 0.17) 0 1.5px, transparent 1.5px),
        radial-gradient(circle at 20% 66%, rgba(241, 214, 155, 0.12) 0 1.2px, transparent 1.2px);
      background-size: 170px 170px, 210px 210px, 250px 250px;
      mix-blend-mode: screen;
      opacity: 0.45;
      animation: stardust 34s linear infinite;
    }

    body::after {
      background:
        radial-gradient(circle at center, rgba(225, 185, 95, 0.2) 0%, rgba(225, 185, 95, 0.03) 26%, transparent 55%),
        conic-gradient(from 10deg, transparent 0 15%, rgba(225, 185, 95, 0.12) 19%, transparent 24%, rgba(225, 185, 95, 0.1) 30%, transparent 42%, rgba(225, 185, 95, 0.14) 48%, transparent 62%, rgba(225, 185, 95, 0.08) 73%, transparent 100%);
      filter: blur(1px);
      opacity: 0.22;
      animation: glyphDrift 26s linear infinite;
    }

    .glass-shell {
      position: relative;
      z-index: 1;
      width: min(94vw, 980px);
      border-radius: 28px;
      background: linear-gradient(160deg, rgba(26, 18, 33, 0.76), rgba(10, 7, 14, 0.72));
      border: 1px solid rgba(220, 182, 108, 0.45);
      box-shadow: 0 35px 80px rgba(0, 0, 0, 0.72), 0 0 42px rgba(220, 182, 108, 0.18);
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      min-height: min(86vh, 900px);
    }

    .book-stage {
      perspective: 1200px;
      perspective-origin: 50% 45%;
      width: min(88vw, 720px);
      min-height: calc(var(--book-h) + 16px);
      display: grid;
      place-items: center;
      position: relative;
      margin: 0 auto;
    }

    .book-halo {
      position: absolute;
      width: calc(var(--book-w) * 1.65);
      height: calc(var(--book-h) * 0.9);
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(234, 200, 127, 0.56) 0%, rgba(234, 200, 127, 0.15) 38%, transparent 74%);
      filter: blur(10px);
      opacity: 0.35;
      transform: translateY(26px) scale(0.88);
      transition: transform 1s ease, opacity 1s ease, filter 1s ease;
      pointer-events: none;
    }

    .book-core {
      width: var(--book-w);
      height: var(--book-h);
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(15deg) rotateY(-10deg) translateX(-2%);
      transition: transform 1.15s cubic-bezier(0.2, 0.85, 0.25, 1);
    }

    .book-stage.open .book-core {
      transform: rotateX(15deg) rotateY(0deg) translateX(12%);
    }

    .book-stage.open .book-halo {
      opacity: 0.76;
      transform: translateY(18px) scale(1.13);
      filter: blur(6px);
    }

    .back-cover-group,
    .sheet-stack,
    .spread,
    .front-cover {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
    }

    .back-cover-group {
      z-index: 1;
      transform: translateZ(0);
    }

    .layer {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* 封底厚度：通过 Z 轴堆叠多层 dark layer 实现真实板材厚度 */
    .back-cover-group .layer {
      background: linear-gradient(145deg, #2a1b15, #110b09);
      border: 1px solid rgba(0, 0, 0, 0.6);
      box-shadow: inset 0 0 0 1px rgba(106, 77, 43, 0.18);
    }

    .sheet-stack {
      inset: 8px 12px;
      border-radius: 10px;
      transform: translateZ(5px);
      z-index: 8;
      pointer-events: none;
    }

    /* 书页厚度：10~15 层羊皮纸色块沿 Z 轴叠加 */
    .sheet-layer {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 20px;
      border-radius: 6px 9px 9px 6px;
      border: 1px solid rgba(204, 190, 160, 0.45);
      background: repeating-linear-gradient(
        180deg,
        #f9f2de 0px,
        #f9f2de 2px,
        #ebdfc3 2px,
        #ebdfc3 4px
      );
      transform: translateZ(var(--z)) translateX(var(--x));
      box-shadow: inset 0 0 0 1px rgba(255, 248, 229, 0.3);
    }

    .spread {
      inset: 8px 12px;
      border-radius: 10px;
      overflow: hidden;
      transform: translateZ(12px);
      display: block;
      background: #eadfc6;
      border: 1px solid rgba(150, 122, 77, 0.45);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25), inset 0 0 0 1px rgba(255, 251, 236, 0.34);
      z-index: 12;
      transition: transform 1.15s cubic-bezier(0.2, 0.85, 0.25, 1);
    }

    .book-stage.open .spread {
      transform: translateZ(16px);
    }

    .book-spine {
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 0;
      width: 18px;
      border-radius: 999px;
      transform: translateX(-9px) translateZ(16px);
      background: linear-gradient(
        90deg,
        rgba(43, 28, 16, 0.9) 0%,
        rgba(178, 142, 80, 0.62) 48%,
        rgba(43, 28, 16, 0.9) 100%
      );
      box-shadow:
        0 0 12px rgba(0, 0, 0, 0.56),
        inset 0 0 8px rgba(255, 224, 158, 0.38);
      opacity: 0.62;
      z-index: 18;
      transition: transform 1.15s cubic-bezier(0.2, 0.85, 0.25, 1), opacity 1s ease, box-shadow 1s ease;
      pointer-events: none;
    }

    .book-spine::before,
    .book-spine::after {
      content: "";
      position: absolute;
      top: 6px;
      bottom: 6px;
      width: 24px;
      pointer-events: none;
    }

    .book-spine::before {
      left: -22px;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.26), transparent);
    }

    .book-spine::after {
      right: -22px;
      background: linear-gradient(270deg, rgba(0, 0, 0, 0.26), transparent);
    }

    .book-stage.open .book-spine {
      transform: translateX(-9px) translateZ(18px);
      opacity: 0.9;
      box-shadow:
        0 0 16px rgba(0, 0, 0, 0.6),
        inset 0 0 11px rgba(255, 224, 158, 0.44);
    }

    .page {
      width: 100%;
      height: 100%;
      position: relative;
      background: linear-gradient(145deg, var(--parchment), #f0e4c8);
      border: 1px solid rgba(133, 108, 66, 0.38);
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(132, 103, 62, 0.45);
      border-radius: 3px;
      pointer-events: none;
    }

    .right-page {
      box-shadow: inset 16px 0 20px rgba(122, 93, 57, 0.16);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .right-page .edge {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 10px;
      background: repeating-linear-gradient(
        180deg,
        rgba(205, 187, 150, 0.65) 0px,
        rgba(205, 187, 150, 0.65) 2px,
        rgba(242, 231, 205, 0.9) 2px,
        rgba(242, 231, 205, 0.9) 5px
      );
    }

    .right-page .edge {
      right: 0;
      border-left: 1px solid rgba(133, 108, 66, 0.2);
    }

    .answer {
      font-family: "Noto Serif TC", serif;
      color: #3d2814;
      text-align: center;
      letter-spacing: 1px;
      line-height: 1.7;
      font-size: clamp(20px, 4.8vw, 34px);
      font-weight: 700;
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.45s ease, transform 0.45s ease;
      text-shadow: 0 1px 0 rgba(255, 245, 220, 0.7);
      position: relative;
      z-index: 2;
    }

    .answer.show {
      opacity: 1;
      transform: scale(1);
    }

    .front-cover {
      transform-origin: left center;
      transform: translateZ(24px) rotateY(0deg);
      transition: transform 1.2s cubic-bezier(0.2, 0.85, 0.25, 1);
      z-index: 24;
      pointer-events: none;
    }

    .book-stage.open .front-cover {
      transform: translateZ(16px) rotateY(-180deg);
      z-index: 6;
    }

    .book-stage.opened-final .front-cover {
      transform: translateZ(16px) rotateY(-180deg);
    }

    .front-cover .cover-thickness {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: linear-gradient(145deg, #1f1512, #120d0a);
      border: 1px solid rgba(0, 0, 0, 0.5);
      transform: translateZ(var(--z));
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .cover-face,
    .cover-inside {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    .cover-face {
      transform: translateZ(6px);
      background:
        linear-gradient(165deg, rgba(255, 232, 196, 0.11), transparent 38%),
        radial-gradient(circle at 30% 20%, rgba(255, 227, 155, 0.08), transparent 45%),
        repeating-linear-gradient(35deg, rgba(255, 255, 255, 0.03) 0 2px, rgba(0, 0, 0, 0.05) 2px 5px),
        linear-gradient(145deg, var(--cover-1), var(--cover-2));
      border: 1px solid rgba(79, 55, 35, 0.9);
      box-shadow: 0 26px 34px rgba(0, 0, 0, 0.35), inset 0 0 0 1px rgba(212, 170, 96, 0.16);
    }

    .cover-face::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 2px dashed rgba(202, 161, 87, 0.32);
      border-radius: 10px;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(214, 176, 95, 0.78);
      opacity: 0.9;
    }

    .corner.tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
    .corner.tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; border-radius: 0 8px 0 0; }
    .corner.bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; border-radius: 0 0 0 8px; }
    .corner.br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; }

    .sigil {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .sigil-core {
      width: 40%;
      aspect-ratio: 1;
      border-radius: 999px;
      position: relative;
      display: grid;
      place-items: center;
      background: radial-gradient(circle, rgba(224, 184, 101, 0.25), rgba(224, 184, 101, 0.04) 60%, transparent 74%);
      box-shadow: 0 0 18px rgba(224, 184, 101, 0.3);
      border: 1px solid rgba(224, 184, 101, 0.55);
    }

    .sigil-core::before {
      content: "";
      position: absolute;
      inset: 8%;
      border: 2px dashed rgba(224, 184, 101, 0.72);
      border-radius: 999px;
      animation: rotateGlyph 12s linear infinite;
    }

    .sigil-text {
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-family: "Noto Serif TC", serif;
      color: rgba(239, 206, 129, 0.96);
      letter-spacing: 3px;
      font-size: clamp(16px, 3.4vw, 28px);
      text-shadow: 0 0 10px rgba(224, 184, 101, 0.46);
    }

    .cover-inside {
      inset: 8px 12px;
      border-radius: 10px;
      transform: rotateY(180deg) translateZ(0px);
      background:
        linear-gradient(145deg, #f5ecd7, #e6d5b0 80%),
        radial-gradient(circle at 62% 38%, rgba(83, 57, 31, 0.08), transparent 50%);
      border: 1px solid rgba(116, 91, 53, 0.42);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28);
    }

    .cover-inside::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(109, 83, 52, 0.42);
      border-radius: 3px;
    }

    .cover-inner-edge {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 10px;
      background: repeating-linear-gradient(
        180deg,
        rgba(205, 187, 150, 0.65) 0px,
        rgba(205, 187, 150, 0.65) 2px,
        rgba(242, 231, 205, 0.9) 2px,
        rgba(242, 231, 205, 0.9) 5px
      );
      border-right: 1px solid rgba(133, 108, 66, 0.2);
      z-index: 2;
    }

    .left-sigil {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transform: rotate(-18deg) scale(1);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
      user-select: none;
      z-index: 1;
      opacity: 0.85;
    }

    .left-sigil-svg {
      width: 78%;
      height: 78%;
      overflow: visible;
    }

    .left-sigil-curve {
      fill: none;
      stroke: rgba(80, 56, 31, 0.16);
      stroke-width: 1.9;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
    }

    .left-sigil-curve.dashed {
      stroke-dasharray: 4 6;
      stroke: rgba(80, 56, 31, 0.13);
    }

    .left-sigil-rune {
      fill: rgba(70, 49, 27, 0.13);
      font-family: "Noto Serif TC", serif;
      font-size: 18px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .control-zone {
      position: relative;
      width: min(100%, 640px);
      height: clamp(136px, 20vh, 188px);
      margin-top: 0.45rem;
    }

    .controls,
    .retry-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .controls.hidden {
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
    }

    .retry-wrap {
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
    }

    .retry-wrap.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .arcane-btn {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .arcane-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 24%, rgba(255, 230, 160, 0.45) 49%, transparent 70%);
      transform: translateX(-130%);
      animation: sheen 3.1s ease-in-out infinite;
      z-index: -1;
    }

    .arcane-btn:hover {
      transform: scale(1.04);
    }

    @keyframes rotateGlyph {
      to { transform: rotate(360deg); }
    }

    @keyframes stardust {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); }
      50% { transform: translate3d(-3%, -2%, 0) rotate(2deg); }
      100% { transform: translate3d(-6%, -4%, 0) rotate(5deg); }
    }

    @keyframes glyphDrift {
      0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
      50% { transform: translate3d(2%, -3%, 0) rotate(8deg) scale(1.04); }
      100% { transform: translate3d(4%, -6%, 0) rotate(16deg) scale(1.08); }
    }

    @keyframes sheen {
      0%, 48% { transform: translateX(-130%); }
      62%, 100% { transform: translateX(140%); }
    }
  </style>
</head>
<body class="flex min-h-screen items-center justify-center px-3 py-2 md:px-5 md:py-4 lg:py-5">
  <main class="glass-shell flex w-full shrink-0 flex-col items-center justify-start px-4 py-4 md:px-8 md:py-6 lg:px-12 lg:py-8">
    <h1 class="font-serifTC text-2xl font-bold tracking-[0.12em] text-[#ecd8ad] md:text-4xl lg:text-5xl">解答之書</h1>
    <p class="mt-2 font-sansTC text-xs tracking-[0.2em] text-[#cdbd97] md:text-sm lg:text-base">The Grimoire of Answers</p>

    <section class="book-stage mt-3 md:mt-5" id="bookStage" aria-label="魔法書占卜場景">
      <div class="book-halo" id="bookHalo"></div>

      <div class="book-core" id="bookCore">
        <div class="back-cover-group" aria-hidden="true">
          <div class="layer" style="transform: translateZ(0px);"></div>
          <div class="layer" style="transform: translateZ(1px);"></div>
          <div class="layer" style="transform: translateZ(2px);"></div>
          <div class="layer" style="transform: translateZ(3px);"></div>
        </div>

        <div class="sheet-stack" aria-hidden="true">
          <div class="sheet-layer" style="--z: 4px; --x: -8px;"></div>
          <div class="sheet-layer" style="--z: 5px; --x: -7px;"></div>
          <div class="sheet-layer" style="--z: 6px; --x: -7px;"></div>
          <div class="sheet-layer" style="--z: 7px; --x: -6px;"></div>
          <div class="sheet-layer" style="--z: 8px; --x: -6px;"></div>
          <div class="sheet-layer" style="--z: 9px; --x: -5px;"></div>
          <div class="sheet-layer" style="--z: 10px; --x: -5px;"></div>
          <div class="sheet-layer" style="--z: 11px; --x: -4px;"></div>
          <div class="sheet-layer" style="--z: 12px; --x: -4px;"></div>
          <div class="sheet-layer" style="--z: 13px; --x: -3px;"></div>
          <div class="sheet-layer" style="--z: 14px; --x: -2px;"></div>
          <div class="sheet-layer" style="--z: 15px; --x: -1px;"></div>
        </div>

        <div class="spread" aria-hidden="true">
          <div class="page right-page">
            <span class="edge"></span>
            <p id="answerText" class="answer"></p>
          </div>
        </div>

        <div class="book-spine" aria-hidden="true"></div>

        <div class="front-cover" id="frontCover" aria-hidden="true">
          <div class="cover-thickness" style="--z: 0px;"></div>
          <div class="cover-thickness" style="--z: 1px;"></div>
          <div class="cover-thickness" style="--z: 2px;"></div>
          <div class="cover-thickness" style="--z: 3px;"></div>
          <div class="cover-thickness" style="--z: 4px;"></div>

          <div class="cover-face">
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>
            <div class="sigil">
              <div class="sigil-core">
                <span class="sigil-text">解答之書</span>
              </div>
            </div>
          </div>

          <div class="cover-inside">
            <span class="cover-inner-edge"></span>
            <div class="left-sigil" id="leftSigil"></div>
          </div>
        </div>
      </div>
    </section>

    <div class="control-zone">
    <section class="controls gap-3 md:gap-4" id="introControls">
      <p class="font-sansTC whitespace-pre-line text-center text-[13px] leading-6 tracking-[0.06em] text-[#e7dcc2] md:text-base md:leading-7 lg:text-lg lg:leading-8">
在心中默念一個問題，
點擊下方按鈕，
接受解答之書的指引。
      </p>
      <button
        id="startBtn"
        class="arcane-btn inline-flex items-center justify-center whitespace-nowrap rounded-full border border-[#dbb46f] bg-gradient-to-b from-[#7b5527] to-[#3e2914] px-10 py-3 font-sansTC text-base font-bold leading-none tracking-[0.12em] text-[#fff3d5] shadow-[0_12px_30px_rgba(0,0,0,0.5)] transition-all duration-300 md:px-12 md:py-4 md:text-lg md:tracking-[0.16em] lg:text-xl"
        type="button"
      >
        開始占卜
      </button>
    </section>

    <section class="retry-wrap" id="retryWrap">
      <button
        id="retryBtn"
        class="inline-flex items-center justify-center whitespace-nowrap rounded-full border border-[#d8b06a] bg-[#1e140f]/90 px-10 py-3 font-sansTC text-sm font-bold leading-none tracking-[0.12em] text-[#f9eac8] shadow-[0_8px_20px_rgba(0,0,0,0.55)] transition duration-300 hover:scale-105 md:px-12 md:py-4 md:text-base md:tracking-[0.16em]"
        type="button"
      >
        再問一次
      </button>
    </section>
    </div>
  </main>

  <script>
    const answers = [
      "是的",
      "現在不要行動",
      "再等等看",
      "事情會自然發展",
      "你已經知道答案",
      "可能，但需要努力",
      "時機未到",
      "放手會更好",
      "結果比你想的好",
      "謹慎行事",
      "值得一試",
      "不如改變方向",
      "順其自然",
      "會有轉機",
      "現在不是最佳時機",
      "你需要更多資訊",
      "相信直覺",
      "結果不如預期",
      "可以嘗試",
      "保持耐心",
      "答案在風中",
      "不要懷疑自己",
      "去問問別人",
      "接受現實",
      "會有意想不到的收穫",
      "專注於當下",
      "這是個好主意",
      "再考慮一下",
      "毫無疑問",
      "絕對不行"
    ];

    const bookStage = document.getElementById("bookStage");
    const introControls = document.getElementById("introControls");
    const answerText = document.getElementById("answerText");
    const leftSigil = document.getElementById("leftSigil");
    const retryWrap = document.getElementById("retryWrap");
    const startBtn = document.getElementById("startBtn");
    const retryBtn = document.getElementById("retryBtn");

    let lastIndex = -1;
    let isAnimating = false;
    let lastSigilSignature = "";
    const sigilRunes = ["✶", "✦", "◇", "◈", "☽", "☉", "△", "⟁", "✷"];

    function pickRandomAnswer() {
      if (answers.length === 1) return { text: answers[0], index: 0 };
      let idx;
      do {
        idx = Math.floor(Math.random() * answers.length);
      } while (idx === lastIndex);
      lastIndex = idx;
      return { text: answers[idx], index: idx };
    }

    function createPRNG(seed) {
      let state = seed >>> 0;
      return () => {
        state = (state * 1664525 + 1013904223) >>> 0;
        return state / 4294967296;
      };
    }

    function buildSigilPattern(answer, index) {
      const baseSeed =
        [...answer].reduce((acc, ch) => acc + ch.charCodeAt(0), 0) +
        index * 131 +
        Math.floor(Math.random() * 100000);

      for (let attempt = 0; attempt < 8; attempt += 1) {
        const rand = createPRNG(baseSeed + attempt * 2654435761);
        const pickedRunes = [];
        while (pickedRunes.length < 2) {
          const candidate = sigilRunes[Math.floor(rand() * sigilRunes.length)];
          if (!pickedRunes.includes(candidate)) pickedRunes.push(candidate);
        }

        const lineCount = 4 + Math.floor(rand() * 3);
        const baseY = 58 + Math.floor(rand() * 18);
        const lineGap = 28 + Math.floor(rand() * 7);
        const ampA = 14 + rand() * 16;
        const ampB = 10 + rand() * 14;
        const ampC = 8 + rand() * 12;
        const strokeMain = (1.3 + rand() * 1.1).toFixed(2);
        const strokeAlt = (1.1 + rand() * 0.8).toFixed(2);
        const dashPattern = `${2 + Math.floor(rand() * 3)} ${4 + Math.floor(rand() * 4)}`;

        let curves = "";
        let signature = `${pickedRunes.join("")}|${lineCount}|${baseY}|${lineGap}|${ampA.toFixed(1)}|${ampB.toFixed(1)}|${ampC.toFixed(1)}`;

        for (let i = 0; i < lineCount; i += 1) {
          const y = baseY + i * lineGap;
          const skew = (i - (lineCount - 1) / 2) * (1.2 + rand() * 1.8);
          const a1 = ampA * (0.78 + rand() * 0.38);
          const a2 = ampB * (0.76 + rand() * 0.42);
          const a3 = ampC * (0.72 + rand() * 0.45);
          const dashed = (i + Math.floor(rand() * 2)) % 2 === 0;
          const klass = dashed ? "left-sigil-curve dashed" : "left-sigil-curve";
          const style = dashed
            ? `stroke-dasharray:${dashPattern};stroke-width:${strokeAlt}`
            : `stroke-width:${strokeMain}`;
          signature += `|${y.toFixed(1)}-${a1.toFixed(1)}-${a2.toFixed(1)}-${a3.toFixed(1)}`;
          curves += `
            <path class="${klass}" style="${style}" d="
              M12 ${y}
              C30 ${y - a1 + skew}, 50 ${y + a1 - skew}, 68 ${y}
              S102 ${y - a2 + skew}, 120 ${y}
              S154 ${y + a3 - skew}, 172 ${y}
              S186 ${y - (a1 * 0.72) + skew}, 190 ${y}
            " />
          `;
        }

        if (signature === lastSigilSignature) continue;
        lastSigilSignature = signature;

        const runeNodes = [];
        const runeCount = 5 + Math.floor(rand() * 3);
        for (let i = 0; i < runeCount; i += 1) {
          const x = 28 + rand() * 144;
          const y = 64 + rand() * 132;
          const rune = pickedRunes[i % pickedRunes.length];
          runeNodes.push(`<text class="left-sigil-rune" x="${x.toFixed(1)}" y="${y.toFixed(1)}">${rune}</text>`);
        }
        const centerRune = pickedRunes[Math.floor(rand() * pickedRunes.length)];

        const svg = `
          <svg class="left-sigil-svg" viewBox="0 0 200 260" aria-hidden="true">
            ${curves}
            ${runeNodes.join("")}
            <text class="left-sigil-rune" x="100" y="130">${centerRune}</text>
          </svg>
        `;
        const rotation = -28 + rand() * 24;
        const scale = 0.9 + rand() * 0.16;
        return { svg, rotation, scale };
      }

      return {
        svg: '<svg class="left-sigil-svg" viewBox="0 0 200 260" aria-hidden="true"><path class="left-sigil-curve" d="M24 130 Q100 62, 176 130 Q100 198, 24 130" /><text class="left-sigil-rune" x="100" y="130">✶</text></svg>',
        rotation: -18,
        scale: 1
      };
    }

    function renderLeftSigil(answer, index) {
      const sigil = buildSigilPattern(answer, index);
      leftSigil.style.opacity = "0";
      leftSigil.innerHTML = sigil.svg;
      leftSigil.style.transform = `rotate(${sigil.rotation}deg) scale(${sigil.scale})`;
      requestAnimationFrame(() => {
        leftSigil.style.opacity = "1";
      });
    }

    function startDivination() {
      if (isAnimating || bookStage.classList.contains("open")) return;
      isAnimating = true;

      const selected = pickRandomAnswer();
      introControls.classList.add("hidden");
      bookStage.classList.remove("opened-final");

      setTimeout(() => {
        bookStage.classList.add("open");
      }, 200);

      setTimeout(() => {
        renderLeftSigil(selected.text, selected.index);
      }, 430);

      setTimeout(() => {
        answerText.textContent = selected.text;
        answerText.classList.add("show");
      }, 500);

      setTimeout(() => {
        bookStage.classList.add("opened-final");
      }, 900);

      setTimeout(() => {
        retryWrap.classList.add("show");
        isAnimating = false;
      }, 1000);
    }

    function resetDivination() {
      if (isAnimating || !bookStage.classList.contains("open")) return;
      isAnimating = true;

      retryWrap.classList.remove("show");
      answerText.classList.remove("show");
      bookStage.classList.remove("opened-final");

      setTimeout(() => {
        bookStage.classList.remove("open");
      }, 80);

      setTimeout(() => {
        answerText.textContent = "";
        renderLeftSigil("初始", 0);
        introControls.classList.remove("hidden");
        isAnimating = false;
      }, 1250);
    }

    renderLeftSigil("初始", 0);
    startBtn.addEventListener("click", startDivination);
    retryBtn.addEventListener("click", resetDivination);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>答案之書 · Book of Answers</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #8a6f30;
    --ink: #0d0a06;
    --parchment: #f5e9d0;
    --parchment-dark: #e8d5b0;
    --crimson: #8b1a1a;
    --deep: #1a0f05;
  }

  body {
    background: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', serif;
    overflow: hidden;
    position: relative;
  }

  /* Starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: var(--gold-light);
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to { opacity: 0.7; transform: scale(1.2); }
  }

  /* Radial glow behind book */
  .glow-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse 60% 50% at 50% 55%, rgba(201,168,76,0.07) 0%, transparent 70%);
    z-index: 0;
  }

  /* Layout */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Title */
  .title-wrap {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 1.2s ease both;
  }
  .title-zh {
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    font-size: clamp(13px, 2vw, 16px);
    letter-spacing: 0.6em;
    color: var(--gold-dim);
    display: block;
    margin-bottom: 4px;
  }
  .title-en {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(22px, 4vw, 38px);
    color: var(--gold);
    letter-spacing: 0.05em;
    text-shadow: 0 0 40px rgba(201,168,76,0.4);
  }
  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 12px auto 0;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Instruction */
  .instruction {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(12px, 1.8vw, 15px);
    color: rgba(201,168,76,0.55);
    letter-spacing: 0.05em;
    margin-bottom: 40px;
    animation: fadeDown 1.4s ease both;
    text-align: center;
  }

  /* Book */
  .book-scene {
    perspective: 1200px;
    animation: fadeIn 1.6s ease both;
    cursor: pointer;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .book {
    width: clamp(180px, 28vw, 260px);
    height: clamp(240px, 38vw, 360px);
    position: relative;
    transform-style: preserve-3d;
    transform: rotateY(-15deg) rotateX(5deg);
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
    filter: drop-shadow(-10px 20px 40px rgba(0,0,0,0.8));
  }

  .book:hover {
    transform: rotateY(-5deg) rotateX(2deg) scale(1.04);
    filter: drop-shadow(-15px 30px 50px rgba(201,168,76,0.2)) drop-shadow(-10px 20px 40px rgba(0,0,0,0.8));
  }

  .book.opening {
    animation: bookOpen 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .book.closing {
    animation: bookClose 0.5s ease forwards;
  }

  @keyframes bookOpen {
    0% { transform: rotateY(-15deg) rotateX(5deg); }
    40% { transform: rotateY(-50deg) rotateX(8deg) scale(1.05); }
    70% { transform: rotateY(5deg) rotateX(3deg) scale(1.05); }
    100% { transform: rotateY(-15deg) rotateX(5deg); }
  }
  @keyframes bookClose {
    from { transform: rotateY(-5deg) rotateX(2deg) scale(1.04); }
    to { transform: rotateY(-15deg) rotateX(5deg); }
  }

  /* Book cover */
  .cover {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #3d1f0a 0%, #2a1206 40%, #1e0d04 100%);
    border-radius: 3px 8px 8px 3px;
    border: 1px solid rgba(201,168,76,0.3);
    overflow: hidden;
  }

  /* Gold border frame on cover */
  .cover::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 2px;
  }
  .cover::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 1px;
  }

  .cover-title {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .cover-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(22px, 4.5vw, 38px);
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
  }
  .cover-line {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .cover-en {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(7px, 1.2vw, 10px);
    color: var(--gold-dim);
    letter-spacing: 0.15em;
    text-align: center;
    padding: 0 20px;
  }

  /* Ornament */
  .ornament {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 40px;
    opacity: 0.5;
  }

  /* Spine */
  .spine {
    position: absolute;
    left: -16px;
    top: 0;
    width: 16px;
    height: 100%;
    background: linear-gradient(90deg, #1a0a02, #3d1f0a, #2a1206);
    border-radius: 4px 0 0 4px;
    transform: rotateY(-90deg) translateX(-8px);
    transform-origin: right;
    border-right: 1px solid rgba(201,168,76,0.2);
  }

  /* Pages (right side illusion) */
  .pages {
    position: absolute;
    right: -6px;
    top: 2px;
    width: 8px;
    height: calc(100% - 4px);
    background: repeating-linear-gradient(
      to bottom,
      var(--parchment) 0px,
      var(--parchment-dark) 1px,
      var(--parchment) 2px
    );
    border-radius: 0 2px 2px 0;
  }

  /* Click hint */
  .click-hint {
    margin-top: 28px;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(11px, 1.5vw, 13px);
    color: rgba(201,168,76,0.4);
    letter-spacing: 0.1em;
    animation: pulse 2.5s ease-in-out infinite, fadeIn 2s ease both;
    text-align: center;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* Answer modal */
  .answer-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(5,3,1,0.85);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .answer-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .answer-card {
    position: relative;
    width: clamp(280px, 80vw, 520px);
    background: linear-gradient(160deg, #f5e9d0 0%, #e8d5b0 50%, #dcc89a 100%);
    padding: clamp(32px, 6vw, 56px) clamp(28px, 5vw, 52px);
    text-align: center;
    transform: scale(0.85) rotateX(15deg);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    /* Aged paper effect */
    box-shadow:
      inset 0 0 60px rgba(180,130,60,0.2),
      0 30px 80px rgba(0,0,0,0.7),
      0 0 0 1px rgba(201,168,76,0.4);
  }
  .answer-card::before {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(139,107,50,0.35);
    pointer-events: none;
  }
  .answer-card::after {
    content: '';
    position: absolute;
    inset: 16px;
    border: 1px solid rgba(139,107,50,0.15);
    pointer-events: none;
  }

  .answer-overlay.visible .answer-card {
    transform: scale(1) rotateX(0deg);
  }

  .answer-page-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px;
    color: rgba(100,70,20,0.45);
    letter-spacing: 0.3em;
    margin-bottom: 20px;
  }

  .answer-ornament-top {
    font-size: 18px;
    color: rgba(139,107,50,0.5);
    margin-bottom: 16px;
    display: block;
  }

  .answer-text-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 600;
    color: #3a1f06;
    line-height: 1.5;
    margin-bottom: 12px;
    letter-spacing: 0.15em;
  }

  .answer-text-en {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(13px, 2vw, 16px);
    color: rgba(80,45,10,0.7);
    letter-spacing: 0.05em;
    margin-bottom: 20px;
  }

  .answer-ornament-bot {
    font-size: 18px;
    color: rgba(139,107,50,0.5);
    margin-bottom: 24px;
    display: block;
  }

  .ask-again-btn {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(9px, 1.5vw, 11px);
    letter-spacing: 0.2em;
    color: #5c3410;
    background: none;
    border: 1px solid rgba(139,107,50,0.5);
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }
  .ask-again-btn:hover {
    background: rgba(139,107,50,0.1);
    border-color: rgba(139,107,50,0.8);
    color: #3a1f06;
  }

  /* Particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
  }
  .particle.burst {
    animation: particleBurst var(--pd) ease-out forwards;
  }
  @keyframes particleBurst {
    0% { opacity: 0.9; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow-bg"></div>
<div class="particles" id="particles"></div>

<div class="container">
  <div class="title-wrap">
    <span class="title-zh">古老的神諭</span>
    <div class="title-en">Book of Answers</div>
    <div class="divider"></div>
  </div>

  <p class="instruction">心懷一問，輕觸書卷，答案自現<br><small style="font-size:0.85em;opacity:0.7;">Hold a question in your mind · Click the book</small></p>

  <div class="book-scene" onclick="openBook()" id="bookScene">
    <div class="book" id="book">
      <div class="spine"></div>
      <div class="cover">
        <div class="cover-title">
          <div class="cover-zh">答案之書</div>
          <div class="cover-line"></div>
          <div class="cover-en">The Book of Answers</div>
        </div>
        <svg class="ornament" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="12" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
          <circle cx="20" cy="20" r="8" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
          <line x1="20" y1="4" x2="20" y2="36" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
          <line x1="4" y1="20" x2="36" y2="20" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
          <line x1="9" y1="9" x2="31" y2="31" stroke="#c9a84c" stroke-width="0.5" opacity="0.25"/>
          <line x1="31" y1="9" x2="9" y2="31" stroke="#c9a84c" stroke-width="0.5" opacity="0.25"/>
          <circle cx="20" cy="20" r="2" fill="#c9a84c" opacity="0.6"/>
        </svg>
      </div>
      <div class="pages"></div>
    </div>
  </div>

  <p class="click-hint" id="clickHint">— 點擊書本，獲取答案 —</p>
</div>

<!-- Answer overlay -->
<div class="answer-overlay" id="overlay" onclick="closeAnswer(event)">
  <div class="answer-card" id="answerCard">
    <div class="answer-page-num" id="pageNum">PAGE · 000</div>
    <span class="answer-ornament-top">✦ ✦ ✦</span>
    <div class="answer-text-zh" id="answerZh"></div>
    <div class="answer-text-en" id="answerEn"></div>
    <span class="answer-ornament-bot">✦ ✦ ✦</span>
    <button class="ask-again-btn" onclick="closeAnswer(null)">再問一次 · Ask Again</button>
  </div>
</div>

<script>
const answers = [
  { zh: "是的，毫無疑問", en: "Yes, without doubt" },
  { zh: "順其自然", en: "Let it unfold naturally" },
  { zh: "此刻並非良機", en: "The timing is not yet right" },
  { zh: "放手，方能得到", en: "Release, and it shall come" },
  { zh: "跡象一切向好", en: "All signs point to yes" },
  { zh: "內心已知答案", en: "Your heart already knows" },
  { zh: "不要著急", en: "Do not rush" },
  { zh: "前方有更好的", en: "Something better lies ahead" },
  { zh: "未必如你所願", en: "Not as you may wish" },
  { zh: "堅持，必有回報", en: "Persist — it will be rewarded" },
  { zh: "時機尚未成熟", en: "The time has not yet come" },
  { zh: "是的，全力以赴", en: "Yes — give it everything" },
  { zh: "換一個角度看", en: "Seek a different perspective" },
  { zh: "信任你的直覺", en: "Trust your instincts" },
  { zh: "這條路並不適合", en: "This path is not for you" },
  { zh: "重新考慮你的問題", en: "Reconsider the question" },
  { zh: "無需猶豫，行動", en: "Hesitate no more — act" },
  { zh: "答案隱藏在沉默中", en: "The answer hides in silence" },
  { zh: "專注當下，莫問未來", en: "Focus on now, not later" },
  { zh: "命運青睞勇敢的人", en: "Fortune favors the bold" },
  { zh: "也許，但並不確定", en: "Perhaps, but uncertain" },
  { zh: "無論如何，你都會好的", en: "Either way, you will be fine" },
  { zh: "向你信任的人尋求建議", en: "Seek counsel from someone trusted" },
  { zh: "不，請放棄這個想法", en: "No — let this idea go" },
  { zh: "一切都在計劃之中", en: "All unfolds as it should" },
  { zh: "是時候做出改變了", en: "The time for change has come" },
  { zh: "耐心是你的答案", en: "Patience is your answer" },
  { zh: "會有意想不到的轉機", en: "An unexpected turn awaits" },
  { zh: "相信自己的判斷", en: "Believe in your own judgment" },
  { zh: "這將比你預想的更好", en: "It will exceed your expectations" },
];

// Generate stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 0.5;
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${-Math.random()*4}s`;
  starsEl.appendChild(s);
}

let isAnimating = false;

function openBook() {
  if (isAnimating) return;
  isAnimating = true;

  const book = document.getElementById('book');
  book.classList.add('opening');

  // Particle burst from book center
  const scene = document.getElementById('bookScene');
  const rect = scene.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  spawnParticles(cx, cy);

  setTimeout(() => {
    book.classList.remove('opening');
    showAnswer();
    isAnimating = false;
  }, 800);
}

function showAnswer() {
  const a = answers[Math.floor(Math.random() * answers.length)];
  const page = Math.floor(Math.random() * 800) + 100;

  document.getElementById('answerZh').textContent = a.zh;
  document.getElementById('answerEn').textContent = a.en;
  document.getElementById('pageNum').textContent = `PAGE · ${page}`;

  document.getElementById('overlay').classList.add('visible');
}

function closeAnswer(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('visible');
}

function spawnParticles(cx, cy) {
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.3;
    const dist = 60 + Math.random() * 80;
    const px = Math.cos(angle) * dist;
    const py = Math.sin(angle) * dist;
    const dur = 0.6 + Math.random() * 0.4;
    p.style.cssText = `left:${cx}px;top:${cy}px;--px:${px}px;--py:${py}px;--pd:${dur}s;width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;`;
    container.appendChild(p);
    p.offsetHeight; // reflow
    p.classList.add('burst');
    setTimeout(() => p.remove(), dur * 1000 + 100);
  }
}
</script>
</body>
</html>
